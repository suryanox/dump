<!DOCTYPE html>
<html>
  <head>
    <title>Text Metrics</title>
    <style>
      body {
        font-family: sans-serif;
        width: 320px;
        padding: 12px;
        margin: 0;
      }
      h2 { margin: 0 0 8px; font-size: 15px; }
      textarea {
        width: 100%;
        height: 120px;
        box-sizing: border-box;
        resize: vertical;
        font-size: 13px;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        margin-top: 8px;
        width: 100%;
        padding: 7px;
        font-size: 13px;
        cursor: pointer;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 4px;
      }
      button:hover { background: #1558b0; }
      #results {
        margin-top: 10px;
        display: none;
      }
      .metric {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        border-bottom: 1px solid #eee;
        font-size: 13px;
      }
      .metric:last-child { border-bottom: none; }
      .metric span:last-child { font-weight: bold; }
    </style>
  </head>
  <body>
    <h2>Text Metrics</h2>
    <textarea id="input" placeholder="Paste your text here..."></textarea>
    <button id="analyze">Analyze</button>
    <div id="results">
      <div class="metric"><span>Sentences</span><span id="sentences">—</span></div>
      <div class="metric"><span>Words</span><span id="words">—</span></div>
      <div class="metric"><span>Characters</span><span id="chars">—</span></div>
      <div class="metric"><span>Bytes</span><span id="bytes">—</span></div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
